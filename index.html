<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      ;(() => {
        try {
          const saved = localStorage.getItem('algoviz-theme')
          const theme = saved === 'light' || saved === 'dark'
            ? saved
            : (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
          document.documentElement.setAttribute('data-theme', theme)
        } catch {
          document.documentElement.setAttribute('data-theme', 'dark')
        }
      })()
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Caveat:wght@600;700&display=block"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Ma+Shan+Zheng&family=Liu+Jian+Mao+Cao&family=Caveat:wght@600;700&display=block"
      rel="stylesheet"
    />
    <title>algo-viz</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
